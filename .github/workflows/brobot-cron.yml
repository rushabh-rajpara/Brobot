name: Brobot Cron

on:
  schedule:
    - cron: "*/5 * * * *"
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  sessions_tick:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/5 * * * *'
    runs-on: ubuntu-latest
    env:
      BROBOT_CRON_SECRET: ${{ secrets.BROBOT_CRON_SECRET }}
    steps:
      - name: Call sessions tick
        run: |
          SECRET="$(printf '%s' "$BROBOT_CRON_SECRET" | tr -d '\r\n')"
          curl -fsS --get --data-urlencode "secret=$SECRET" "https://brobot-l2g7.onrender.com/cron/sessions-tick"

  daily:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/15 * * * *'
    runs-on: ubuntu-latest
    env:
      BROBOT_CRON_SECRET: ${{ secrets.BROBOT_CRON_SECRET }}
    steps:
      - name: Call daily loop
        run: |
          SECRET="$(printf '%s' "$BROBOT_CRON_SECRET" | tr -d '\r\n')"
          curl -fsS --get --data-urlencode "secret=$SECRET" "https://brobot-l2g7.onrender.com/cron/daily"
